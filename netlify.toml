[build]
  # Cria o cache CSS do NativeWind antes do export para evitar erro SHA-1
  command = "pnpm install && mkdir -p node_modules/react-native-css-interop/.cache && touch node_modules/react-native-css-interop/.cache/web.css && npx expo export --platform web"
  # Diretório de saída do Expo web export
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Headers para assets estáticos - cache longo
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirecionar apenas rotas de navegação para index.html (SPA fallback)
# Expo static export gera HTML para cada rota, mas o JS bundle precisa ser servido diretamente
[[redirects]]
  from = "/_expo/*"
  to = "/_expo/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
